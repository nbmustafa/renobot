# .github/workflows/renovate.yml
#
# Self-hosted Renovate Bot
# ────────────────────────
# Runs on a cron schedule (every 6 h) and can also be triggered manually
# for ad-hoc runs or debug sessions.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   RENOVATE_TOKEN  – A GitHub PAT with the scopes listed below.
#
# Required PAT scopes:
#   repo          (read/write code, PRs, issues)
#   read:org      (if targeting an organisation)
#   workflow      (to update .github/workflows/* files via PRs)
#
# Docs: https://docs.renovatebot.com/getting-started/running/#github-actions

name: 🤖 Renovate Bot

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run mode"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      log_level:
        description: "Log level"
        required: false
        default: "info"
        type: choice
        options: ["info", "debug"]
  push:
    branches: [main]
    paths:
      - ".github/workflows/renovate.yml"
      - "renovate/config.js"

concurrency:
  group: renovate
  cancel-in-progress: true

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      pull-requests: write # Required for Renovate to link PRs

    steps:
      - name: Checkout config repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Renovate cache
        uses: actions/cache@v4
        with:
          # Changed from /tmp/ to workspace to avoid permission issues
          path: ${{ github.workspace }}/renovate-cache
          key: renovate-cache-${{ runner.os }}-${{ hashFiles('renovate/config.js') }}-${{ github.run_id }}
          restore-keys: |
            renovate-cache-${{ runner.os }}-${{ hashFiles('renovate/config.js') }}-
            renovate-cache-${{ runner.os }}-

      - name: Run Renovate Bot
        uses: renovatebot/github-action@v43.0.0
        env:
          # Use absolute paths that Renovate's Docker container recognizes internally
          #RENOVATE_BASE_DIR: /github/workspace/renovate-base
          #RENOVATE_CACHE_DIR: /github/workspace/renovate-cache
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          LOG_LEVEL: ${{ github.event.inputs.log_level || 'info' }}
        with:
          configurationFile: renovate/config.js
          renovate-version: "37.440.0"

      - name: Upload Renovate logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: renovate-logs
          path: ${{ github.workspace }}/renovate-base
          retention-days: 7
